events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  # ─── Upstream services ────────────────────────────────────────────────────
  upstream backend {
    server backend:3001;
  }

  upstream frontend {
    server frontend:80;
  }

  # ─── Main server ──────────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # All API traffic → Fastify backend
    location /api/ {
      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      # Disable buffering for SSE / streaming responses
      proxy_buffering    off;
    }

    # Everything else → React frontend (SPA — always serve index.html)
    location / {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;

      # SPA fallback: on 404 serve index.html so React Router handles it
      proxy_intercept_errors on;
      error_page 404 = @spa_fallback;
    }

    location @spa_fallback {
      proxy_pass http://frontend/index.html;
    }
  }
}
